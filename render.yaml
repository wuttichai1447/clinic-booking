# Laravel API + Admin — โฮสต์ฟรีบน Render (คู่กับ Vercel สำหรับ Nuxt)
# สร้าง PostgreSQL ฟรีที่ https://neon.tech แล้วใส่ DATABASE_URL ใน Environment
services:
  - type: web
    name: clinic-booking-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /up
    preDeployCommand: php artisan migrate --force --no-interaction && php artisan db:seed --force --no-interaction
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require
      - key: CACHE_STORE
        value: array
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: CRON_KEY
        generateValue: true
      - key: BOOKING_REMINDERS_ENABLED
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        sync: false
      - key: PAYMENT_DEV_MODE
        value: "true"
      # Render free tier บล็อก outbound SMTP — ใช้ log เพื่อไม่ให้การจอง/ชำระเงินค้าง
      # ถ้าต้องการส่งอีเมลจริง ใช้ผู้ให้บริการแบบ HTTP API (เช่น Resend/Brevo) แทน SMTP
      - key: MAIL_MAILER
        value: log
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_TIMEOUT
        value: "8"
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
